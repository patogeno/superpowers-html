<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup — Notifications settings (example)</title>
<!--
  Illustrative mockup. It is self-contained (no external scripts, styles, fonts,
  or images) but carries its OWN product look — not the plugin's spec stylesheet.
  Copy the discipline (one file, zero-dependency, inline <style>), not this theme.
-->
<style>
  :root{
    --brand:#2f6f4f; --brand-soft:#e8f3ec; --ink:#1b2420; --muted:#6b7770;
    --line:#dfe5e1; --card:#ffffff; --page:#f4f6f4; --danger:#b3261e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--page);color:var(--ink);
    line-height:1.5;padding:2rem;display:flex;justify-content:center;}
  .app{width:100%;max-width:560px;}
  .topbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;
    display:grid;place-items:center;font-weight:700;}
  .topbar h1{font-size:1.15rem;font-weight:650;}
  .crumb{color:var(--muted);font-size:.85rem;margin-left:auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:1.25rem 1.4rem;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .card h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin-bottom:.9rem;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:.85rem 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .label{font-weight:600;}
  .row .sub{font-size:.82rem;color:var(--muted);}
  .toggle{width:44px;height:26px;border-radius:99px;background:var(--line);position:relative;flex-shrink:0;}
  .toggle.on{background:var(--brand);}
  .toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;
    transition:left .15s;}
  .toggle.on .knob{left:21px;}
  .actions{display:flex;gap:.6rem;margin-top:1.4rem;}
  .btn{border:none;border-radius:9px;padding:.6rem 1.1rem;font-size:.9rem;font-weight:600;cursor:pointer;}
  .btn.primary{background:var(--brand);color:#fff;}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">A</div>
    <h1>Acme</h1>
    <span class="crumb">Settings · Notifications</span>
  </div>
  <section class="card">
    <h2>Email notifications</h2>
    <div class="row">
      <div><div class="label">Product updates</div><div class="sub">New features and improvements</div></div>
      <div class="toggle on"><div class="knob"></div></div>
    </div>
    <div class="row">
      <div><div class="label">Weekly digest</div><div class="sub">A Monday summary of your activity</div></div>
      <div class="toggle on"><div class="knob"></div></div>
    </div>
    <div class="row">
      <div><div class="label">Mentions</div><div class="sub">When a teammate @-mentions you</div></div>
      <div class="toggle"><div class="knob"></div></div>
    </div>
    <div class="actions">
      <button class="btn primary">Save changes</button>
      <button class="btn ghost">Cancel</button>
    </div>
  </section>
</div>
</body>
</html>
